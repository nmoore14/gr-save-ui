services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - db-data:/data
      - ./index.html:/app/index.html
      - ./app.js:/app/app.js
      - ./styles.css:/app/styles.css
      - ./server.ts:/app/server.ts
    environment:
      - DB_PATH=/data/gr.sqlite
    restart: unless-stopped

  admin:
    image: coleifer/sqlite-web
    ports:
      - "8080:8080"
    volumes:
      - db-data:/data
    command: ["-H", "0.0.0.0", "-x", "/data/gr.sqlite"]
    restart: unless-stopped
    depends_on:
      - app

volumes:
  db-data:
